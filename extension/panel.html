<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font: 12px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #1e1e1e;
        color: #d4d4d4;
      }
      .bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-bottom: 1px solid #333;
        background: #252526;
        position: sticky;
        top: 0;
      }
      .title {
        font-weight: 600;
        color: #4ec9b0;
      }
      .status {
        font-size: 11px;
        color: #888;
      }
      .spacer {
        flex: 1;
      }
      .count {
        font-variant-numeric: tabular-nums;
        color: #888;
      }
      button {
        font: inherit;
        background: #333;
        color: #d4d4d4;
        border: 1px solid #444;
        border-radius: 3px;
        padding: 2px 8px;
        cursor: pointer;
      }
      button:hover {
        background: #3d3d3d;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        text-align: left;
        padding: 4px 10px;
        border-bottom: 1px solid #2a2a2a;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      th {
        color: #888;
        font-weight: 500;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      td.method {
        color: #9cdcfe;
        font-weight: 600;
        max-width: 320px;
      }
      td.uuid {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #ce9178;
        cursor: pointer;
      }
      td.uuid:hover {
        text-decoration: underline;
      }
      tr.bad td.method {
        color: #888;
        font-style: italic;
        font-weight: 400;
      }
      .status-ok {
        color: #6a9955;
      }
      .status-err {
        color: #f48771;
      }
      .empty {
        padding: 20px;
        color: #777;
        text-align: center;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="bar">
      <span class="title">AD Chains</span>
      <span id="status" class="status"></span>
      <span class="spacer"></span>
      <span id="count" class="count">0</span>
      <button id="clear" type="button">Clear</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>Method</th>
          <th>UUID</th>
          <th>API</th>
          <th>Status</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div id="empty" class="empty">
      Navigate Automation Designer methods — chain requests appear here with
      their method names.
    </div>
    <script src="panel.js"></script>
  </body>
</html>
