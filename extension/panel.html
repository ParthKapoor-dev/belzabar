<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      /* IoskeleyMono — OFL-licensed Berkeley-Mono-style monospace (fonts/). */
      @font-face {
        font-family: "Ioskeley Mono";
        src: url("fonts/IoskeleyMono-Regular.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "Ioskeley Mono";
        src: url("fonts/IoskeleyMono-Italic.woff2") format("woff2");
        font-weight: 400;
        font-style: italic;
        font-display: swap;
      }
      @font-face {
        font-family: "Ioskeley Mono";
        src: url("fonts/IoskeleyMono-Bold.woff2") format("woff2");
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "Ioskeley Mono";
        src: url("fonts/IoskeleyMono-BoldItalic.woff2") format("woff2");
        font-weight: 700;
        font-style: italic;
        font-display: swap;
      }
      :root {
        color-scheme: dark;
        --mono: "Berkeley Mono", "Ioskeley Mono", ui-monospace,
          SFMono-Regular, Menlo, monospace;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        font: 12px/1.5 var(--mono);
        background: #0c0d0f;
        color: #e6e7e8;
      }
      /* A bounded, viewport-based height (not a `height: 100%` chain, which
         collapses in Firefox's panel iframe) so the list and detail panes
         each get their own scrollbar. */
      body {
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .list-pane,
      .detail-body {
        scrollbar-width: thin;
        scrollbar-color: #2a2d30 #0c0d0f;
      }
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #0c0d0f;
      }
      ::-webkit-scrollbar-thumb {
        background: #2a2d30;
        border-radius: 0;
        border: 2px solid #0c0d0f;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3a3d42;
      }

      /* ---- toolbar ---------------------------------------------------- */
      .toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 8px;
        background: #101113;
        border-bottom: 1px solid #1f2123;
        flex: 0 0 auto;
      }
      .toolbar button {
        font: inherit;
        background: #1f2123;
        color: #e6e7e8;
        border: 1px solid #2a2d30;
        border-radius: 0;
        padding: 2px 8px;
        cursor: pointer;
      }
      .toolbar button:hover {
        background: #16181b;
      }
      #record.on .dot {
        color: #f85149;
      }
      #record .dot {
        color: #9ba1a6;
        font-size: 13px;
      }
      .toolbar label {
        display: flex;
        align-items: center;
        gap: 4px;
        user-select: none;
      }
      #filter {
        font: inherit;
        background: #0c0d0f;
        color: #e6e7e8;
        border: 1px solid #2a2d30;
        border-radius: 0;
        padding: 2px 6px;
        width: 180px;
      }
      .spacer {
        flex: 1;
      }
      .count {
        color: #9ba1a6;
        font-variant-numeric: tabular-nums;
      }
      .offline {
        color: #d29922;
        font-size: 11px;
      }
      .hidden {
        display: none !important;
      }

      /* ---- split: list + detail -------------------------------------- */
      .split {
        flex: 1;
        display: flex;
        min-height: 0;
      }
      .list-pane {
        flex: 1;
        overflow: auto;
        min-width: 0;
      }
      .detail-pane {
        flex: 0 0 46%;
        border-left: 1px solid #1f2123;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      /* ---- request table --------------------------------------------- */
      table {
        width: 100%;
        border-collapse: collapse;
      }
      thead th {
        position: sticky;
        top: 0;
        background: #101113;
        text-align: left;
        padding: 4px 8px;
        font-weight: 500;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #9ba1a6;
        border-bottom: 1px solid #1f2123;
        z-index: 1;
      }
      tbody td {
        padding: 3px 8px;
        border-bottom: 1px solid #16181b;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 320px;
      }
      tbody tr {
        cursor: pointer;
      }
      tbody tr:hover {
        background: #16181b;
      }
      tbody tr.selected {
        background: #1d3a66;
      }
      /* Method name — colour tracks the status group (#9). */
      td.name {
        font-weight: 600;
        color: #3b82f6;
      }
      td.name.s-clienterr {
        color: #d29922;
      }
      td.name.s-srverr {
        color: #f85149;
      }
      td.name.pending {
        font-weight: 400;
        font-style: italic;
        color: #9ba1a6;
      }
      td.name:hover,
      td.category:hover {
        text-decoration: underline;
      }
      td.category {
        color: #9ba1a6;
      }
      td.category.pending {
        color: #9ba1a6;
        font-style: italic;
      }
      .badge {
        display: inline-block;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.05em;
        padding: 1px 4px;
        border-radius: 0;
        color: #0c0d0f;
      }
      .badge.run {
        background: #d29922;
      }
      .badge.get {
        background: #3b82f6;
      }
      /* Status pill — coloured by group so codes are scannable (#9). */
      .sbadge {
        display: inline-block;
        font-size: 10px;
        font-weight: 700;
        padding: 1px 5px;
        border-radius: 0;
        font-variant-numeric: tabular-nums;
        color: #0c0d0f;
      }
      .sbadge.ok {
        background: #3fb950;
      }
      .sbadge.redir {
        background: #3b82f6;
      }
      .sbadge.clienterr {
        background: #d29922;
      }
      .sbadge.srverr {
        background: #f85149;
      }
      .sbadge.pending {
        background: #2a2d30;
        color: #9ba1a6;
      }
      td.mono {
        font-family: var(--mono);
        color: #3fb950;
      }
      td.dim {
        color: #9ba1a6;
      }
      th.col-sr,
      td.sr {
        width: 30px;
        text-align: right;
        color: #5c6166;
        font-variant-numeric: tabular-nums;
        padding-right: 6px;
      }
      th.col-act,
      td.actions {
        width: 1%;
        white-space: nowrap;
      }
      button.act {
        background: transparent;
        border: 1px solid #2a2d30;
        border-radius: 0;
        color: #9ba1a6;
        cursor: pointer;
        padding: 2px 4px 0;
        margin-right: 3px;
        vertical-align: middle;
      }
      button.act:hover {
        background: #2a2d30;
        color: #e6e7e8;
      }
      button.act.ok {
        color: #3fb950;
        border-color: #3fb950;
      }
      .empty {
        padding: 24px;
        text-align: center;
        color: #9ba1a6;
      }

      /* ---- detail pane ----------------------------------------------- */
      .detail-head {
        display: flex;
        align-items: center;
        background: #101113;
        border-bottom: 1px solid #1f2123;
        flex: 0 0 auto;
      }
      .detail-tabs {
        display: flex;
      }
      .detail-tabs button {
        font: inherit;
        background: transparent;
        color: #9ba1a6;
        border: none;
        border-bottom: 2px solid transparent;
        padding: 6px 12px;
        cursor: pointer;
      }
      .detail-tabs button.active {
        color: #e6e7e8;
        border-bottom-color: #3b82f6;
      }
      .detail-act {
        margin-left: auto;
        font: inherit;
        background: transparent;
        color: #9ba1a6;
        border: 1px solid #2a2d30;
        border-radius: 0;
        padding: 2px 8px;
        margin-top: 4px;
        margin-bottom: 4px;
        cursor: pointer;
      }
      .detail-act:hover {
        color: #e6e7e8;
        background: #1f2123;
      }
      .detail-act.ok {
        color: #3fb950;
        border-color: #3fb950;
      }
      .detail-close {
        font: inherit;
        background: transparent;
        color: #9ba1a6;
        border: none;
        padding: 6px 10px;
        cursor: pointer;
        font-size: 14px;
      }
      .detail-close:hover {
        color: #e6e7e8;
      }
      .detail-body {
        flex: 1;
        overflow: auto;
        padding: 8px 10px;
      }
      .detail-body h4 {
        margin: 10px 0 4px;
        color: #3b82f6;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .detail-body h4:first-child {
        margin-top: 0;
      }
      .kv {
        display: grid;
        grid-template-columns: minmax(120px, max-content) 1fr;
        gap: 1px 12px;
      }
      .kv .k {
        color: #3b82f6;
        white-space: nowrap;
      }
      .kv .v {
        color: #e6e7e8;
        word-break: break-all;
      }
      pre {
        margin: 4px 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: var(--mono);
        font-size: 11px;
        color: #e6e7e8;
      }

      /* ---- JSON tree viewer ------------------------------------------ */
      .jsonview {
        margin: 4px 0;
        font-size: 11px;
      }
      .jt-toolbar {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 6px;
      }
      .jt-filter {
        font: inherit;
        font-size: 11px;
        background: #0c0d0f;
        color: #e6e7e8;
        border: 1px solid #2a2d30;
        border-radius: 0;
        padding: 2px 6px;
        width: 150px;
      }
      .jt-btn {
        font: inherit;
        font-size: 11px;
        background: #1f2123;
        color: #e6e7e8;
        border: 1px solid #2a2d30;
        border-radius: 0;
        padding: 1px 7px;
        cursor: pointer;
      }
      .jt-btn:hover {
        background: #16181b;
      }
      .jt-spacer {
        flex: 1;
      }
      .jt-raw-toggle {
        display: flex;
        align-items: center;
        gap: 3px;
        color: #9ba1a6;
        user-select: none;
        cursor: pointer;
      }
      .jt-body {
        font-family: var(--mono);
        line-height: 1.6;
      }
      .jt-row {
        white-space: pre-wrap;
        word-break: break-word;
        border-radius: 0;
      }
      .jt-node > .jt-row:hover {
        background: #16181b;
      }
      .jt-hidden {
        display: none !important;
      }
      .jt-row.jt-match {
        background: #1d3a66;
      }
      .jt-caret {
        display: inline-block;
        width: 11px;
        color: #9ba1a6;
        text-align: center;
        user-select: none;
      }
      .jt-caret-toggle {
        cursor: pointer;
      }
      .jt-caret-toggle::before {
        content: "\25B6";
        font-size: 8px;
      }
      .jt-row.jt-open > .jt-caret-toggle::before {
        content: "\25BC";
      }
      .jt-row.jt-open > .jt-preview {
        display: none;
      }
      .jt-key {
        color: #3b82f6;
      }
      .jt-count {
        color: #9ba1a6;
        margin-right: 4px;
      }
      .jt-preview {
        color: #5c6166;
        cursor: pointer;
      }
      .jt-str {
        color: #3fb950;
      }
      .jt-num {
        color: #d29922;
      }
      .jt-bool {
        color: #3b82f6;
      }
      .jt-null {
        color: #9ba1a6;
      }

      /* ---- toast ------------------------------------------------------ */
      .toast {
        position: fixed;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%);
        background: #101113;
        border: 1px solid #3b82f6;
        color: #e6e7e8;
        padding: 6px 12px;
        border-radius: 0;
        font-size: 12px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
        z-index: 10;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <button id="record" class="on" type="button" title="Toggle recording">
        <span class="dot">&#9679;</span> Recording
      </button>
      <button id="clear" type="button" title="Clear requests">Clear</button>
      <label title="Keep requests across page navigations">
        <input id="preserve" type="checkbox" /> Preserve log
      </label>
      <input id="filter" type="text" placeholder="Filter (name, uuid, url)" />
      <span class="spacer"></span>
      <span id="offline" class="offline hidden">belz web offline &mdash; names unavailable</span>
      <span id="count" class="count">0</span>
    </div>

    <div class="split">
      <div class="list-pane">
        <table>
          <thead>
            <tr>
              <th class="col-sr">#</th>
              <th>Method Name</th>
              <th>Category</th>
              <th class="col-act">Actions</th>
              <th>Status</th>
              <th>HTTP</th>
              <th>Kind</th>
              <th>Published ID</th>
              <th>Type</th>
              <th>Size</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
        <div id="empty" class="empty">
          Recording AD chain requests &mdash; navigate or run an AD method and
          they appear here with their method names.
        </div>
      </div>

      <div id="detail" class="detail-pane hidden">
        <div class="detail-head">
          <div class="detail-tabs">
            <button data-tab="headers" class="active" type="button">Headers</button>
            <button data-tab="payload" type="button">Payload</button>
            <button data-tab="response" type="button">Response</button>
            <button data-tab="timing" type="button">Timing</button>
          </div>
          <button id="detail-copy" class="detail-act" type="button" title="Copy this tab">Copy</button>
          <button id="detail-close" class="detail-close" type="button">&times;</button>
        </div>
        <div id="detail-body" class="detail-body"></div>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="dist/panel.js"></script>
  </body>
</html>
