<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        color-scheme: light dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        font: 12px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #1e1e1e;
        color: #d4d4d4;
      }
      /* Height is viewport-based, not a `height: 100%` chain: Firefox's
         DevTools panel iframe does not give the document a resolvable
         percentage height, so `height: 100%` would collapse the body to
         zero and `overflow: hidden` would then clip everything to black. */
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ---- toolbar ---------------------------------------------------- */
      .toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 8px;
        background: #252526;
        border-bottom: 1px solid #333;
        flex: 0 0 auto;
      }
      .toolbar button {
        font: inherit;
        background: #333;
        color: #d4d4d4;
        border: 1px solid #444;
        border-radius: 3px;
        padding: 2px 8px;
        cursor: pointer;
      }
      .toolbar button:hover {
        background: #3d3d3d;
      }
      #record.on .dot {
        color: #f44;
      }
      #record .dot {
        color: #888;
        font-size: 13px;
      }
      .toolbar label {
        display: flex;
        align-items: center;
        gap: 4px;
        user-select: none;
      }
      #filter {
        font: inherit;
        background: #1e1e1e;
        color: #d4d4d4;
        border: 1px solid #444;
        border-radius: 3px;
        padding: 2px 6px;
        width: 180px;
      }
      .spacer {
        flex: 1;
      }
      .count {
        color: #888;
        font-variant-numeric: tabular-nums;
      }
      .offline {
        color: #d0903a;
        font-size: 11px;
      }
      .hidden {
        display: none !important;
      }

      /* ---- split: list + detail -------------------------------------- */
      .split {
        flex: 1;
        display: flex;
        min-height: 0;
      }
      .list-pane {
        flex: 1;
        overflow: auto;
        min-width: 0;
      }
      .detail-pane {
        flex: 0 0 46%;
        border-left: 1px solid #333;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      /* ---- request table --------------------------------------------- */
      table {
        width: 100%;
        border-collapse: collapse;
      }
      thead th {
        position: sticky;
        top: 0;
        background: #252526;
        text-align: left;
        padding: 4px 8px;
        font-weight: 500;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #888;
        border-bottom: 1px solid #333;
        z-index: 1;
      }
      tbody td {
        padding: 3px 8px;
        border-bottom: 1px solid #2a2a2a;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 320px;
      }
      tbody tr {
        cursor: pointer;
      }
      tbody tr:hover {
        background: #2a2d2e;
      }
      tbody tr.selected {
        background: #094771;
      }
      td.name {
        color: #9cdcfe;
        font-weight: 600;
      }
      td.name.pending {
        color: #888;
        font-weight: 400;
        font-style: italic;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .badge {
        display: inline-block;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.05em;
        padding: 1px 4px;
        border-radius: 3px;
        color: #1e1e1e;
      }
      .badge.run {
        background: #dcb67a;
      }
      .badge.get {
        background: #6a9bd1;
      }
      td.status-ok {
        color: #6a9955;
      }
      td.status-err {
        color: #f48771;
      }
      td.mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #ce9178;
      }
      td.dim {
        color: #888;
      }
      .empty {
        padding: 24px;
        text-align: center;
        color: #777;
      }

      /* ---- detail pane ----------------------------------------------- */
      .detail-head {
        display: flex;
        align-items: center;
        background: #252526;
        border-bottom: 1px solid #333;
        flex: 0 0 auto;
      }
      .detail-tabs {
        display: flex;
      }
      .detail-tabs button {
        font: inherit;
        background: transparent;
        color: #aaa;
        border: none;
        border-bottom: 2px solid transparent;
        padding: 6px 12px;
        cursor: pointer;
      }
      .detail-tabs button.active {
        color: #fff;
        border-bottom-color: #4ec9b0;
      }
      .detail-close {
        margin-left: auto;
        font: inherit;
        background: transparent;
        color: #aaa;
        border: none;
        padding: 6px 10px;
        cursor: pointer;
        font-size: 14px;
      }
      .detail-close:hover {
        color: #fff;
      }
      .detail-body {
        flex: 1;
        overflow: auto;
        padding: 8px 10px;
      }
      .detail-body h4 {
        margin: 10px 0 4px;
        color: #4ec9b0;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .detail-body h4:first-child {
        margin-top: 0;
      }
      .kv {
        display: grid;
        grid-template-columns: minmax(120px, max-content) 1fr;
        gap: 1px 12px;
      }
      .kv .k {
        color: #9cdcfe;
        white-space: nowrap;
      }
      .kv .v {
        color: #d4d4d4;
        word-break: break-all;
      }
      pre {
        margin: 4px 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        color: #d4d4d4;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <button id="record" class="on" type="button" title="Toggle recording">
        <span class="dot">&#9679;</span> Recording
      </button>
      <button id="clear" type="button" title="Clear requests">Clear</button>
      <label title="Keep requests across page navigations">
        <input id="preserve" type="checkbox" /> Preserve log
      </label>
      <input id="filter" type="text" placeholder="Filter (name, uuid, url)" />
      <span class="spacer"></span>
      <span id="offline" class="offline hidden">belz web offline &mdash; names unavailable</span>
      <span id="count" class="count">0</span>
    </div>

    <div class="split">
      <div class="list-pane">
        <table>
          <thead>
            <tr>
              <th>Method Name</th>
              <th>Status</th>
              <th>HTTP</th>
              <th>Kind</th>
              <th>URL</th>
              <th>Type</th>
              <th>Size</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
        <div id="empty" class="empty">
          Recording AD chain requests &mdash; navigate or run an AD method and
          they appear here with their method names.
        </div>
      </div>

      <div id="detail" class="detail-pane hidden">
        <div class="detail-head">
          <div class="detail-tabs">
            <button data-tab="headers" class="active" type="button">Headers</button>
            <button data-tab="payload" type="button">Payload</button>
            <button data-tab="response" type="button">Response</button>
            <button data-tab="timing" type="button">Timing</button>
          </div>
          <button id="detail-close" class="detail-close" type="button">&times;</button>
        </div>
        <div id="detail-body" class="detail-body"></div>
      </div>
    </div>

    <script src="panel.js"></script>
  </body>
</html>
